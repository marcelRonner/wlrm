<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WLRM</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Arial', 'Helvetica', sans-serif;
            font-weight: 900;
            font-size: clamp(2rem, 20vw, 40rem);
            letter-spacing: -0.05em;
        }

        .container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        .half {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 25%;
            flex-shrink: 0;
        }

        .left {
            background-color: #000;
            color: #fff;
        }

        .right {
            background-color: #fff;
            color: #000;
        }

        .forest-bg {
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: #000;
        }

        .city-bg {
            background-image: url('https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?auto=format&fit=crop&w=1600&q=80&sat=-100');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: #fff;
        }

        #l-cell {
            position: relative;
        }

        #m-cell {
            position: relative;
        }

        #l-letter {
            letter-spacing: 0;
        }

        #m-letter {
            letter-spacing: 0;
        }

        #less-text {
            position: absolute;
            white-space: nowrap;
            font-family: 'Arial', 'Helvetica', sans-serif;
            font-weight: 900;
            line-height: 1;
            letter-spacing: 0;
            transform-origin: left top;
        }

        #more-text {
            position: absolute;
            white-space: nowrap;
            font-family: 'Arial', 'Helvetica', sans-serif;
            font-weight: 900;
            line-height: 1;
            letter-spacing: 0;
            transform-origin: left top;
        }

        #forest-debug-id {
            position: absolute;
            top: 10px;
            right: 12px;
            font-family: 'Arial', 'Helvetica', sans-serif;
            font-size: 9px;
            font-weight: 200;
            letter-spacing: 0;
            color: #fff;
            z-index: 10;
            pointer-events: none;
        }

        /* Responsive for smaller screens */
        @media (max-width: 768px) {
            body {
                font-size: clamp(1.5rem, 15vw, 30rem);
            }
        }

        @media (max-width: 480px) {
            body {
                font-size: clamp(1rem, 12vw, 20rem);
            }
        }

        /* Portrait/mobile: stack panels vertically */
        @media (max-aspect-ratio: 1/1) {
            .container {
                flex-direction: column;
            }

            .half {
                width: 100%;
                height: 25%;
            }

            body {
                font-size: clamp(2rem, 22vw, 24rem);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="half left city-bg">W</div>
        <div class="half left" id="l-cell">
            <span id="l-letter">L</span>
            <span id="less-text">LESS</span>
        </div>
        <div class="half right forest-bg">R</div>
        <div class="half right" id="m-cell">
            <span id="m-letter">M</span>
            <span id="more-text">MORE</span>
            <span id="forest-debug-id"></span>
        </div>
    </div>
    <script>
        const FOREST_IMAGES = [
            { id: 'forest-01', url: 'https://images.unsplash.com/photo-1472396961693-142e6e269027?auto=format&fit=crop&w=1600&q=80' },
            { id: 'forest-02', url: 'https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=1600&q=80' },
            { id: 'forest-03', url: 'https://images.unsplash.com/photo-1448375240586-882707db888b?auto=format&fit=crop&w=1600&q=80' },
            { id: 'forest-04', url: 'https://images.unsplash.com/photo-1425913397330-cf8af2ff40a1?auto=format&fit=crop&w=1600&q=80' },
            { id: 'forest-05', url: 'https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=1600&q=80' },
            { id: 'forest-06', url: 'https://images.unsplash.com/photo-1511497584788-876760111969?auto=format&fit=crop&w=1600&q=80' },
            { id: 'forest-07', url: 'https://images.unsplash.com/photo-1470058869958-2a77ade41c02?auto=format&fit=crop&w=1600&q=80' },
            { id: 'forest-08', url: 'https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?auto=format&fit=crop&w=1600&q=80' },
            { id: 'forest-09', url: 'https://images.unsplash.com/photo-1425913397330-cf8af2ff40a1?auto=format&fit=crop&w=1600&q=80&sat=20' },
            { id: 'forest-10', url: 'https://images.unsplash.com/photo-1502082553048-f009c37129b9?auto=format&fit=crop&w=1600&q=80' }
        ];

        function setRandomForestBackground() {
            const forestPanel = document.querySelector('.forest-bg');
            const debugId = document.getElementById('forest-debug-id');
            if (!forestPanel) return;
            const randomIndex = Math.floor(Math.random() * FOREST_IMAGES.length);
            const selected = FOREST_IMAGES[randomIndex];
            forestPanel.style.backgroundImage = `url('${selected.url}')`;
            forestPanel.dataset.forestId = selected.id;
            if (debugId) {
                debugId.textContent = selected.id;
            }
        }

        function measureInk(text, fontSize) {
            const padding = Math.ceil(fontSize * 0.6);
            const width = Math.ceil(fontSize * Math.max(4, text.length * 1.6)) + padding * 2;
            const height = Math.ceil(fontSize * 2.4) + padding * 2;

            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');

            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = '#000';
            ctx.textBaseline = 'alphabetic';
            ctx.font = `900 ${fontSize}px Arial, Helvetica, sans-serif`;

            const x = padding;
            const y = padding + fontSize;
            ctx.fillText(text, x, y);

            const data = ctx.getImageData(0, 0, width, height).data;
            let minX = width;
            let maxX = -1;

            for (let px = 0; px < width; px++) {
                for (let py = 0; py < height; py++) {
                    const alpha = data[(py * width + px) * 4 + 3];
                    if (alpha > 0) {
                        if (px < minX) minX = px;
                        if (px > maxX) maxX = px;
                    }
                }
            }

            if (maxX < minX) {
                return { width: 0, left: 0 };
            }

            return {
                width: maxX - minX + 1,
                left: minX - x
            };
        }

        function fitSubText(letterId, subTextId, cellId) {
            const letter = document.getElementById(letterId);
            const subText = document.getElementById(subTextId);
            const cell = document.getElementById(cellId);
            if (!letter || !subText || !cell) return;

            const letterChar = (letter.textContent || '').trim();
            const subWord = (subText.textContent || '').trim();
            if (!letterChar || !subWord) return;

            const letterFontSize = parseFloat(window.getComputedStyle(letter).fontSize);

            // Measure painted pixels (ink), not text box metrics.
            const letterInk = measureInk(letterChar, letterFontSize);
            const subInkAtLetterSize = measureInk(subWord, letterFontSize);
            if (!letterInk.width || !subInkAtLetterSize.width) return;

            // Size subtext so its painted width matches letter's painted width.
            let subFontSize = letterFontSize * (letterInk.width / subInkAtLetterSize.width);
            subText.style.fontSize = subFontSize + 'px';

            // One correction pass for sub-pixel precision.
            const subInkFirst = measureInk(subWord, subFontSize);
            if (subInkFirst.width) {
                subFontSize *= letterInk.width / subInkFirst.width;
                subText.style.fontSize = subFontSize + 'px';
            }

            const subInkFinal = measureInk(subWord, subFontSize);

            // Position subtext just below the letter.
            const letterRect = letter.getBoundingClientRect();
            const cellRect = cell.getBoundingClientRect();
            const verticalTighten = Math.max(2, letterFontSize * 0.2);
            subText.style.top = (letterRect.bottom - cellRect.top - verticalTighten) + 'px';

            // Align by painted left edge (ink), not span box edge.
            const visualLeftLetter = letterRect.left + letterInk.left;
            const subLeft = visualLeftLetter - subInkFinal.left;
            subText.style.left = (subLeft - cellRect.left) + 'px';
        }

        function fitSubTexts() {
            fitSubText('l-letter', 'less-text', 'l-cell');
            fitSubText('m-letter', 'more-text', 'm-cell');
        }

        window.addEventListener('load', () => {
            setRandomForestBackground();
            if (document.fonts && document.fonts.ready) {
                document.fonts.ready.then(fitSubTexts);
            } else {
                fitSubTexts();
            }
        });
        window.addEventListener('resize', fitSubTexts);
    </script>
</body>
</html>
